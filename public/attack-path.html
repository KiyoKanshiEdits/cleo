<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleo — Attack Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg-card:#111118;--bg-card-hover:#16161f;
  --amber:#f0a500;--amber-dim:rgba(240,165,0,0.15);--amber-glow:rgba(240,165,0,0.4);
  --red:#ff4444;--red-dim:rgba(255,68,68,0.15);--red-glow:rgba(255,68,68,0.3);
  --green:#00cc88;--green-dim:rgba(0,204,136,0.15);
  --blue:#4488ff;--purple:#9966ff;--orange:#ff8844;
  --text:#e8e8ef;--text-dim:rgba(232,232,239,0.5);--text-muted:rgba(232,232,239,0.3);
  --border:rgba(240,165,0,0.12);
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);z-index:9999}

/* HEADER */
.header{padding:24px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--amber);letter-spacing:2px;text-transform:uppercase}
.header-tag{font-family:var(--mono);font-size:11px;color:var(--red);background:var(--red-dim);padding:4px 10px;border-radius:3px;letter-spacing:1px;text-transform:uppercase}
.header-nav{display:flex;gap:20px;align-items:center}
.header-link{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-decoration:none;letter-spacing:1px;text-transform:uppercase;transition:color 0.2s}
.header-link:hover{color:var(--amber)}

/* SEARCH */
.search-section{max-width:640px;margin:60px auto 0;padding:0 24px;text-align:center}
.search-title{font-family:var(--mono);font-size:14px;color:var(--amber);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.search-subtitle{font-size:14px;color:var(--text-dim);margin-bottom:32px;line-height:1.6}
.search-bar{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--bg-card);transition:border-color 0.3s}
.search-bar:focus-within{border-color:var(--amber);box-shadow:0 0 20px rgba(240,165,0,0.08)}
.search-input{flex:1;background:transparent;border:none;padding:14px 18px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none}
.search-input::placeholder{color:var(--text-muted)}
.search-btn{background:var(--amber);color:var(--bg);border:none;padding:14px 28px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:background 0.2s}
.search-btn:hover{background:#ffb820}
.search-btn:disabled{opacity:0.4;cursor:not-allowed}
.status-line{text-align:center;margin-top:16px;font-family:var(--mono);font-size:12px;color:var(--text-dim);min-height:18px}
.status-line.error{color:var(--red)}

/* GRAPH CONTAINER */
.graph-container{display:none;max-width:1100px;margin:0 auto;padding:20px 24px 40px}
.graph-container.active{display:block}

/* Wallet summary bar */
.wallet-summary{display:flex;align-items:center;gap:20px;padding:16px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;margin-bottom:24px;flex-wrap:wrap}
.wallet-addr{font-family:var(--mono);font-size:13px;color:var(--amber)}
.wallet-meta{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:2px}
.wallet-score{margin-left:auto;display:flex;align-items:center;gap:8px}
.wallet-score-label{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.wallet-score-val{font-family:var(--mono);font-size:22px;font-weight:700}
.score-low{color:var(--green)}.score-mid{color:var(--amber)}.score-high{color:var(--red)}

/* SVG GRAPH CANVAS */
.graph-canvas{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative}
.graph-svg{width:100%;display:block}

/* Edge lines */
.graph-edge{stroke-width:1.5;fill:none;opacity:0;transition:opacity 0.6s ease}
.graph-edge.revealed{opacity:1}
.graph-edge-glow{stroke-width:4;fill:none;opacity:0;filter:blur(3px);transition:opacity 0.6s ease}
.graph-edge-glow.revealed{opacity:0.3}

/* Nodes */
.graph-node{opacity:0;transform-origin:center;cursor:pointer;transition:opacity 0.4s ease}
.graph-node.revealed{opacity:1}
.graph-node:hover .node-ring{stroke-width:3;filter:drop-shadow(0 0 8px var(--amber))}

/* Edge labels */
.edge-label{font-family:var(--mono);font-size:9px;fill:var(--text-muted);opacity:0;transition:opacity 0.5s ease;pointer-events:none}
.edge-label.revealed{opacity:1}

/* Node tooltips on hover */
.node-tooltip{position:absolute;background:var(--bg-card);border:1px solid var(--amber);border-radius:4px;padding:10px 14px;font-family:var(--mono);font-size:11px;color:var(--text);pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:50;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.node-tooltip.show{opacity:1}
.tt-label{font-size:9px;color:var(--amber);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.tt-addr{color:var(--text-dim);font-size:10px;word-break:break-all;margin-bottom:4px}
.tt-detail{color:var(--text-dim);font-size:10px;line-height:1.5}
.tt-cta{color:var(--amber);font-size:9px;margin-top:6px;letter-spacing:0.5px}

/* Legend */
.graph-legend{display:flex;gap:20px;padding:16px 20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* Info cards below graph */
.info-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:24px}
.info-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:20px;opacity:0;transform:translateY(16px);transition:opacity 0.5s ease,transform 0.5s ease}
.info-card.revealed{opacity:1;transform:translateY(0)}
.info-card.critical{border-color:rgba(255,68,68,0.3)}
.ic-step{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.ic-title{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ic-body{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:10px}
.ic-evidence{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:4px;padding:10px 14px;margin-bottom:10px}
.ic-ev-label{font-family:var(--mono);font-size:9px;color:var(--amber);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.ic-ev-row{font-family:var(--mono);font-size:11px;color:var(--text);line-height:1.5;display:flex;align-items:baseline;gap:6px}
.ic-ev-row::before{content:'›';color:var(--amber);flex-shrink:0}
.ic-ev-val{color:var(--amber)}.ic-ev-danger{color:var(--red)}
.ic-ev-link{color:var(--amber);text-decoration:none;border-bottom:1px dashed rgba(240,165,0,0.3)}
.ic-ev-link:hover{border-color:var(--amber)}
.ic-mitigation{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--green-dim);border:1px solid rgba(0,204,136,0.2);border-radius:4px;font-family:var(--mono);font-size:10px;color:var(--green)}

/* CTA */
.cta-section{margin-top:32px;padding:32px;background:linear-gradient(135deg,rgba(240,165,0,0.08),rgba(255,68,68,0.08));border:1px solid var(--amber);border-radius:8px;text-align:center;opacity:0;transform:translateY(20px);transition:opacity 0.6s,transform 0.6s}
.cta-section.revealed{opacity:1;transform:translateY(0)}
.cta-title{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--amber);margin-bottom:8px}
.cta-desc{font-size:14px;color:var(--text-dim);margin-bottom:20px;line-height:1.6}
.cta-btn{display:inline-block;background:var(--amber);color:var(--bg);font-family:var(--mono);font-size:13px;font-weight:600;padding:12px 32px;border-radius:4px;text-decoration:none;letter-spacing:1px;text-transform:uppercase;transition:background 0.2s}
.cta-btn:hover{background:#ffb820}

/* OWL */
.owl-observer{position:fixed;bottom:24px;right:24px;z-index:100;display:none;flex-direction:column;align-items:center;gap:8px}
.owl-observer.active{display:flex}
.owl-bubble{background:var(--bg-card);border:1px solid var(--amber);border-radius:8px 8px 8px 0;padding:10px 14px;max-width:220px;font-family:var(--mono);font-size:11px;color:var(--amber);line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,0.4);opacity:0;transform:translateY(8px);transition:opacity 0.3s,transform 0.3s}
.owl-bubble.show{opacity:1;transform:translateY(0)}

/* Pulse animation for center node */
@keyframes pulse-ring{0%{r:42;opacity:0.4}100%{r:58;opacity:0}}
@keyframes node-pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:1}}
.node-pop{animation:node-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both}

/* Edge draw animation */
@keyframes dash-draw{to{stroke-dashoffset:0}}
@keyframes dash-flow{from{stroke-dashoffset:20}to{stroke-dashoffset:0}}

@media(max-width:640px){
  .header{padding:16px 20px;flex-wrap:wrap;gap:12px}
  .search-section{margin-top:40px}
  .graph-container{padding:16px 12px 40px}
  .info-cards{grid-template-columns:1fr}
  .graph-legend{gap:12px}
  .owl-observer{bottom:12px;right:12px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">Cleo</div>
    <div class="header-tag">Attack Path</div>
  </div>
  <div class="header-nav">
    <a href="/" class="header-link">&larr; Scanner</a>
    <a href="/portfolio" class="header-link">Portfolio</a>
  </div>
</div>

<div class="search-section" id="searchSection">
  <div class="search-title">Threat Simulation</div>
  <div class="search-subtitle">Enter a Solana wallet address to visualize how a threat actor maps your on-chain identity — node by node.</div>
  <div class="search-bar">
    <input type="text" class="search-input" id="addressInput" placeholder="Paste a Solana address..." spellcheck="false" autocomplete="off">
    <button class="search-btn" id="scanBtn" onclick="runTrace()">Trace</button>
  </div>
  <div class="status-line" id="statusLine"></div>
</div>

<div class="graph-container" id="graphContainer">
  <div class="wallet-summary" id="walletSummary"></div>

  <div class="graph-canvas" id="graphCanvas">
    <svg class="graph-svg" id="graphSvg" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="node-tooltip" id="tooltip"></div>
  </div>

  <div class="graph-legend" id="graphLegend"></div>
  <div class="info-cards" id="infoCards"></div>

  <div class="cta-section" id="ctaSection">
    <div class="cta-title">Break the Chain</div>
    <div class="cta-desc" id="ctaDesc"></div>
    <a href="/" class="cta-btn">Scan Another Wallet</a>
  </div>
</div>

<div class="owl-observer" id="owlObserver">
  <div class="owl-bubble" id="owlBubble"></div>
  <div style="width:70px;height:70px">
    <svg viewBox="0 0 200 200" width="70" height="70">
      <ellipse cx="100" cy="130" rx="50" ry="45" fill="#2a2218" stroke="#f0a500" stroke-width="1.5"/>
      <circle cx="100" cy="80" r="35" fill="#2a2218" stroke="#f0a500" stroke-width="1.5"/>
      <path d="M72 52 L65 30 L80 48" fill="#2a2218" stroke="#f0a500" stroke-width="1.5"/>
      <path d="M128 52 L135 30 L120 48" fill="#2a2218" stroke="#f0a500" stroke-width="1.5"/>
      <circle cx="82" cy="78" r="14" fill="#1a1a10" stroke="#f0a500" stroke-width="1"/>
      <circle cx="82" cy="78" r="10" fill="#f0a500" opacity="0.9"/>
      <circle cx="82" cy="78" r="5" fill="#0a0a0f"/>
      <circle cx="118" cy="78" r="14" fill="#1a1a10" stroke="#f0a500" stroke-width="1"/>
      <circle cx="118" cy="78" r="10" fill="#f0a500" opacity="0.9"/>
      <circle cx="118" cy="78" r="5" fill="#0a0a0f"/>
      <circle cx="118" cy="78" r="16" fill="none" stroke="#f0a500" stroke-width="1.5" opacity="0.6"/>
      <path d="M95 88 L100 96 L105 88" fill="#d49200"/>
      <circle cx="155" cy="130" r="12" fill="none" stroke="#f0a500" stroke-width="2" opacity="0.7"/>
      <line x1="163" y1="138" x2="172" y2="150" stroke="#f0a500" stroke-width="2" opacity="0.7"/>
    </svg>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   ATTACK PATH — Network Graph Visualization
   Consumes POST /api/score { walletAddress }
   Response: { score, level, verdict, tagline, privacy, addressProfile, risks[], findings[] }
   ═══════════════════════════════════════════════════════════════════ */

const COLORS = {
  center: '#f0a500',
  sns: '#ff6644',
  cex: '#ff4444',
  whale: '#ff8844',
  pump: '#ff6688',
  dex: '#9966ff',
  timing: '#4488ff',
  counterparty: '#00cc88',
  funding: '#44aaff',
  privacy: '#00cc88',
};

const OWL_QUIPS = [
  "Starting the trace... let's see what you've left behind.",
  "Interesting. The breadcrumbs are forming a trail.",
  "An attacker would love this much data.",
  "Every node is a piece of your identity.",
  "The web grows. Each connection is a vulnerability.",
  "And there it is — a full profile from one address.",
];

let animating = false;

// URL param
(function(){const a=new URLSearchParams(location.search).get('address');if(a){document.getElementById('addressInput').value=a;setTimeout(runTrace,100)}})();
document.getElementById('addressInput').addEventListener('keydown',e=>{if(e.key==='Enter')runTrace()});

// ─── MAIN ───
async function runTrace(){
  const address=document.getElementById('addressInput').value.trim();
  if(!address||animating)return;
  if(!/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(address)){setStatus('Invalid Solana address',true);return}

  animating=true;
  document.getElementById('scanBtn').disabled=true;
  setStatus('Fetching on-chain data...');
  resetUI();

  try{
    const res=await fetch('/api/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({walletAddress:address})});
    if(!res.ok)throw new Error('API returned '+res.status);
    const data=await res.json();
    if(data.error)throw new Error(data.error);

    setStatus('Building attack graph...');
    const graph=buildGraph(address,data);
    renderSummary(address,data);
    renderLegend(graph);
    document.getElementById('graphContainer').classList.add('active');
    document.getElementById('owlObserver').classList.add('active');
    setStatus('');
    await animateGraph(address,graph,data);
  }catch(err){
    setStatus(err.message||'Failed to fetch wallet data',true);
  }finally{
    animating=false;
    document.getElementById('scanBtn').disabled=false;
  }
}

// ─── BUILD GRAPH NODES from API data ───
function buildGraph(address,data){
  const nodes=[];
  const risks=data.risks||[];
  const ap=data.addressProfile||{};
  const priv=data.privacy||{};
  const findings=data.findings||[];
  const getRisk=name=>(risks.find(r=>r.name===name)||{value:0,tier:'low'});
  const findF=kw=>findings.find(f=>f.title&&f.title.toLowerCase().includes(kw.toLowerCase()));

  // SNS
  if(ap.domain){
    nodes.push({id:'sns',color:COLORS.sns,label:ap.domain+'.sol',sublabel:'SNS Domain',
      icon:'🔗',critical:true,
      action:'Wallet resolves to a .sol domain — attacker can search "'+ap.domain+'" across social platforms.',
      evidence:[{l:'Domain',v:ap.domain+'.sol',d:true},{l:'Exposure',v:getRisk('Social Linkage').value+'/100',d:getRisk('Social Linkage').value>=50}],
      mitigation:'Use a separate wallet for SNS domains.',
      link:'https://solscan.io/account/'+address
    });
  }

  // CEX
  const cexAct=ap.cexActivity||[];
  if(cexAct.length>0){
    const cexF=findF('CEX')||findF('Exchange');
    nodes.push({id:'cex',color:COLORS.cex,label:cexAct.map(c=>c.name).join(', '),sublabel:'Exchange Deposits',
      icon:'🏦',critical:true,
      action:'Deposits to '+cexAct.map(c=>c.name).join(', ')+' detected. KYC-linked identity is now reachable.',
      evidence:[
        {l:'Exchanges',v:cexAct.map(c=>c.name+' ('+c.txCount+'x)').join(', '),d:true},
        {l:'Risk',v:'KYC-linked identity',d:true},
        ...(cexF&&cexF.txSignature?[{l:'Tx',v:cexF.txSignature,link:'https://solscan.io/tx/'+cexF.txSignature}]:[]
      )],
      mitigation:'Route through Vanish before exchange deposits.',
      link:cexF&&cexF.txSignature?'https://solscan.io/tx/'+cexF.txSignature:'https://solscan.io/account/'+address
    });
  }

  // Whale
  const whaleR=getRisk('Whale Flagging');
  if(whaleR.value>20){
    nodes.push({id:'whale',color:COLORS.whale,label:ap.solBalance+' SOL',sublabel:'High Value',
      icon:'🐋',critical:whaleR.tier==='crit'||whaleR.tier==='high',
      action:'Balance of '+ap.solBalance+' SOL + '+(ap.tokenCount||0)+' tokens flags as high-value target.',
      evidence:[{l:'Balance',v:ap.solBalance+' SOL',d:parseFloat(ap.solBalance)>=50},{l:'Tokens',v:(ap.tokenCount||0)+''},{l:'Score',v:whaleR.value+'/100'}],
      mitigation:'Split holdings across multiple wallets.',
      link:'https://solscan.io/account/'+address
    });
  }

  // Pump.fun
  const pumpR=getRisk('Leaderboard Visibility');
  const pumpF=findF('Pump.fun');
  if(pumpR.value>10&&pumpF&&pumpF.type!=='ok'){
    nodes.push({id:'pump',color:COLORS.pump,label:pumpF.title,sublabel:'Leaderboard',
      icon:'🏆',critical:pumpR.tier==='crit',
      action:'Pump.fun activity makes this wallet visible on high-traffic leaderboards.',
      evidence:[{l:'Activity',v:pumpF.detail},{l:'Score',v:pumpR.value+'/100',d:pumpR.value>=50}],
      mitigation:'Use a burner wallet for pump.fun.',
      link:pumpF.txSignature?'https://solscan.io/tx/'+pumpF.txSignature:'https://solscan.io/account/'+address
    });
  }

  // DEX / Copy-Trade
  const copyR=getRisk('Copy-Trade Risk');
  const copyF=findF('Copy-Trade')||findF('Trading Pattern')||findF('DEX');
  if(copyR.value>20&&copyF&&copyF.type!=='ok'){
    nodes.push({id:'dex',color:COLORS.dex,label:'DEX Trader',sublabel:'Copy-Target',
      icon:'📊',critical:copyR.tier==='crit',
      action:'High swap frequency makes this wallet a prime copy-trade bot target.',
      evidence:[{l:'Signal',v:copyF.detail},{l:'Score',v:copyR.value+'/100'}],
      mitigation:'Rotate trading wallets regularly.',
      link:copyF.txSignature?'https://solscan.io/tx/'+copyF.txSignature:'https://solscan.io/account/'+address
    });
  }

  // Timing
  const behR=getRisk('Behavioural Pattern');
  if(behR.value>20){
    const behF=findF('Clustered');
    nodes.push({id:'timing',color:COLORS.timing,label:'Pattern Found',sublabel:'Timezone',
      icon:'⏰',critical:false,
      action:'Transaction clustering reveals activity schedule and probable timezone.',
      evidence:[{l:'Score',v:behR.value+'/100'},...(behF?[{l:'Detail',v:behF.detail}]:[]),{l:'Intel',v:'Timezone, routine',d:true}],
      mitigation:'Vary transaction timing.',
      link:'https://solscan.io/account/'+address
    });
  }

  // Counterparties (top 4)
  const allCounterparties=[...(ap.topSendTo||[]).slice(0,2),...(ap.topReceiveFrom||[]).slice(0,2)];
  const seen=new Set();
  allCounterparties.forEach(c=>{
    if(seen.has(c.address)||nodes.length>=10)return;
    seen.add(c.address);
    const dir=(ap.topSendTo||[]).find(s=>s.address===c.address)?'Sent to':'Received from';
    nodes.push({id:'cp-'+c.address.slice(0,8),color:COLORS.counterparty,
      label:(c.label||shortAddr(c.address)),sublabel:dir+' · '+c.count+'x',
      icon:'🔄',critical:!!c.label,
      action:dir+' '+shortAddr(c.address)+(c.label?' ('+c.label+')':'')+' — '+c.count+' transactions.',
      evidence:[{l:'Address',v:shortAddr(c.address)},{l:'Txns',v:c.count+'x'},...(c.label?[{l:'Label',v:c.label,d:true}]:[])],
      link:'https://solscan.io/account/'+c.address
    });
  });

  // Funding sources (top 2)
  (ap.fundingSources||[]).slice(0,2).forEach(f=>{
    if(f.isPrivacy||nodes.length>=12)return;
    nodes.push({id:'fund-'+f.address.slice(0,8),color:COLORS.funding,
      label:(f.label||shortAddr(f.address)),sublabel:'Funded '+f.amountSol+' SOL',
      icon:'💰',critical:!!f.label,
      action:'Funding source: '+shortAddr(f.address)+(f.label?' ('+f.label+')':'')+' sent '+f.amountSol+' SOL.',
      evidence:[{l:'Source',v:shortAddr(f.address)},{l:'Amount',v:f.amountSol+' SOL'},...(f.label?[{l:'Label',v:f.label,d:true}]:[])],
      mitigation:'Fund new wallets through Vanish.',
      link:'https://solscan.io/account/'+f.address
    });
  });

  // Privacy (positive note)
  const protos=priv.protocolsUsed||[];
  if(protos.length>0&&protos[0]!=='None detected'){
    nodes.push({id:'privacy',color:COLORS.privacy,label:'Privacy Used',sublabel:protos.join(', ').slice(0,30),
      icon:'🛡️',critical:false,isDefense:true,
      action:'Privacy protocol interactions detected — partial chain breaks.',
      evidence:protos.map(p=>({l:'Protocol',v:p})),
      link:'https://solscan.io/account/'+address
    });
  }

  return nodes;
}

// ─── LAYOUT — position nodes in a radial pattern around center ───
function layoutNodes(nodes,W,H){
  const cx=W/2, cy=H/2;
  const n=nodes.length;
  if(n===0)return[];

  // Radial layout with some jitter for organic feel
  const baseRadius=Math.min(W,H)*0.34;
  return nodes.map((node,i)=>{
    const angle=(i/n)*Math.PI*2 - Math.PI/2;
    const rJitter=baseRadius+(Math.sin(i*2.7)*20);
    const x=cx+rJitter*Math.cos(angle);
    const y=cy+rJitter*Math.sin(angle);
    return{...node,x,y};
  });
}

// ─── RENDER SVG GRAPH ───
async function animateGraph(address,graphNodes,data){
  const svg=document.getElementById('graphSvg');
  const W=900,H=600;
  const cx=W/2,cy=H/2;
  svg.innerHTML='';

  const positioned=layoutNodes(graphNodes,W,H);

  // --- Defs for glow filters ---
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-lg"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  `;
  svg.appendChild(defs);

  // --- Grid background ---
  const grid=document.createElementNS('http://www.w3.org/2000/svg','g');
  grid.setAttribute('opacity','0.04');
  for(let x=0;x<=W;x+=50){grid.innerHTML+=`<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="${COLORS.center}" stroke-width="0.5"/>`}
  for(let y=0;y<=H;y+=50){grid.innerHTML+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="${COLORS.center}" stroke-width="0.5"/>`}
  svg.appendChild(grid);

  // --- Edges layer ---
  const edgesG=document.createElementNS('http://www.w3.org/2000/svg','g');
  svg.appendChild(edgesG);

  // --- Nodes layer ---
  const nodesG=document.createElementNS('http://www.w3.org/2000/svg','g');
  svg.appendChild(nodesG);

  // --- Center node (wallet) ---
  showOwl(OWL_QUIPS[0]);
  await delay(400);

  const centerG=document.createElementNS('http://www.w3.org/2000/svg','g');
  centerG.setAttribute('class','graph-node revealed');
  centerG.innerHTML=`
    <circle cx="${cx}" cy="${cy}" r="44" fill="none" stroke="${COLORS.center}" stroke-width="1" opacity="0.15">
      <animate attributeName="r" values="44;58;44" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="${cx}" cy="${cy}" r="36" fill="rgba(240,165,0,0.08)" stroke="${COLORS.center}" stroke-width="2" filter="url(#glow)"/>
    <text x="${cx}" y="${cy-8}" text-anchor="middle" font-family="var(--mono)" font-size="10" fill="${COLORS.center}" font-weight="700">TARGET</text>
    <text x="${cx}" y="${cy+6}" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="var(--text-dim)">${shortAddr(address)}</text>
    <text x="${cx}" y="${cy+18}" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="var(--text-muted)">${data.score}/100</text>
  `;
  centerG.style.cursor='pointer';
  centerG.onclick=()=>window.open('https://solscan.io/account/'+address,'_blank');
  centerG.onmouseenter=e=>showTooltip(e,'Target Wallet',address,'Score: '+data.score+'/100 — '+data.verdict,'Click to view on Solscan');
  centerG.onmouseleave=hideTooltip;
  nodesG.appendChild(centerG);

  await delay(600);

  // --- Animate each node + edge ---
  const infoCardsEl=document.getElementById('infoCards');
  infoCardsEl.innerHTML='';

  for(let i=0;i<positioned.length;i++){
    const node=positioned[i];
    const quipIdx=Math.min(i+1,OWL_QUIPS.length-1);
    if(i%2===0)showOwl(OWL_QUIPS[quipIdx]);

    // Draw edge
    const edgePath=createEdge(cx,cy,node.x,node.y,node.color,node.critical);
    edgesG.appendChild(edgePath.glow);
    edgesG.appendChild(edgePath.line);

    // Edge label
    const mx=(cx+node.x)/2, my=(cy+node.y)/2;
    const labelEl=document.createElementNS('http://www.w3.org/2000/svg','text');
    labelEl.setAttribute('x',mx);
    labelEl.setAttribute('y',my-6);
    labelEl.setAttribute('text-anchor','middle');
    labelEl.setAttribute('class','edge-label');
    labelEl.textContent=node.sublabel||'';
    edgesG.appendChild(labelEl);

    await delay(150);

    // Reveal edge
    edgePath.line.classList.add('revealed');
    edgePath.glow.classList.add('revealed');
    labelEl.classList.add('revealed');

    await delay(250);

    // Draw node
    const nodeG=createNode(node);
    nodesG.appendChild(nodeG);
    await delay(50);
    nodeG.classList.add('revealed');

    // Info card
    const card=createInfoCard(node,i);
    infoCardsEl.appendChild(card);
    await delay(100);
    card.classList.add('revealed');

    await delay(300);
  }

  // CTA
  await delay(400);
  const crits=positioned.filter(n=>n.critical).length;
  document.getElementById('ctaDesc').textContent=crits+' critical exposure node'+(crits!==1?'s were':' was')+' discovered. Each is a link an attacker can exploit. Break the chain.';
  document.getElementById('ctaSection').classList.add('revealed');
  showOwl(OWL_QUIPS[OWL_QUIPS.length-1]);
}

// ─── CREATE SVG EDGE ───
function createEdge(x1,y1,x2,y2,color,critical){
  const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);

  const glow=document.createElementNS('http://www.w3.org/2000/svg','line');
  glow.setAttribute('x1',x1);glow.setAttribute('y1',y1);
  glow.setAttribute('x2',x2);glow.setAttribute('y2',y2);
  glow.setAttribute('stroke',color);
  glow.setAttribute('class','graph-edge-glow');

  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1);line.setAttribute('y1',y1);
  line.setAttribute('x2',x2);line.setAttribute('y2',y2);
  line.setAttribute('stroke',color);
  line.setAttribute('class','graph-edge');
  if(!critical){
    line.setAttribute('stroke-dasharray','6 4');
    line.style.animation='dash-flow 2s linear infinite';
  }

  return{line,glow};
}

// ─── CREATE SVG NODE ───
function createNode(node){
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','graph-node');
  const r=node.critical?24:20;
  const fillOpacity=node.isDefense?'0.15':'0.08';

  g.innerHTML=`
    <circle cx="${node.x}" cy="${node.y}" r="${r+8}" fill="none" stroke="${node.color}" stroke-width="1" opacity="0.1"/>
    <circle class="node-ring" cx="${node.x}" cy="${node.y}" r="${r}" fill="${node.color}" fill-opacity="${fillOpacity}" stroke="${node.color}" stroke-width="${node.critical?2:1.5}" filter="url(#glow)"/>
    <text x="${node.x}" y="${node.y-2}" text-anchor="middle" font-family="var(--mono)" font-size="${node.critical?10:9}" fill="${node.color}" font-weight="600">${truncate(node.label,14)}</text>
    <text x="${node.x}" y="${node.y+10}" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="var(--text-muted)">${truncate(node.sublabel||'',18)}</text>
  `;

  g.style.cursor='pointer';
  g.onclick=()=>{if(node.link)window.open(node.link,'_blank')};
  g.onmouseenter=e=>showTooltip(e,node.icon+' '+node.sublabel,node.label,node.action,'Click to view on Solscan');
  g.onmouseleave=hideTooltip;

  return g;
}

// ─── CREATE INFO CARD ───
function createInfoCard(node,idx){
  const card=document.createElement('div');
  card.className='info-card'+(node.critical?' critical':'');

  let evidenceHtml='';
  if(node.evidence&&node.evidence.length){
    evidenceHtml='<div class="ic-evidence"><div class="ic-ev-label">Evidence</div>';
    node.evidence.forEach(e=>{
      if(e.link){
        evidenceHtml+=`<div class="ic-ev-row"><span>${e.l}:</span> <a class="ic-ev-link" href="${e.link}" target="_blank" rel="noopener">${truncate(e.v,30)}</a></div>`;
      }else{
        evidenceHtml+=`<div class="ic-ev-row"><span>${e.l}:</span> <span class="${e.d?'ic-ev-danger':'ic-ev-val'}">${e.v}</span></div>`;
      }
    });
    evidenceHtml+='</div>';
  }

  let mitigationHtml=node.mitigation?`<div class="ic-mitigation"><span>🛡️</span> ${node.mitigation}</div>`:'';

  card.innerHTML=`
    <div class="ic-step">Node ${String(idx+1).padStart(2,'0')}</div>
    <div class="ic-title"><span>${node.icon}</span> ${node.label}</div>
    <div class="ic-body">${node.action}</div>
    ${evidenceHtml}
    ${mitigationHtml}
  `;
  return card;
}

// ─── LEGEND ───
function renderLegend(nodes){
  const types=new Map();
  nodes.forEach(n=>{if(!types.has(n.id.split('-')[0]))types.set(n.id.split('-')[0],{color:n.color,label:n.sublabel||n.label})});
  types.set('center',{color:COLORS.center,label:'Target Wallet'});
  const el=document.getElementById('graphLegend');
  el.innerHTML=[...types.entries()].map(([k,v])=>`<div class="legend-item"><div class="legend-dot" style="background:${v.color}"></div>${v.label}</div>`).join('');
}

// ─── TOOLTIP ───
function showTooltip(e,label,addr,detail,cta){
  const tt=document.getElementById('tooltip');
  const canvas=document.getElementById('graphCanvas');
  const rect=canvas.getBoundingClientRect();
  tt.innerHTML=`<div class="tt-label">${label}</div><div class="tt-addr">${addr}</div><div class="tt-detail">${detail}</div>${cta?'<div class="tt-cta">'+cta+'</div>':''}`;
  tt.classList.add('show');
  const x=e.clientX-rect.left+12;
  const y=e.clientY-rect.top-10;
  tt.style.left=Math.min(x,rect.width-290)+'px';
  tt.style.top=y+'px';
}
function hideTooltip(){document.getElementById('tooltip').classList.remove('show')}

// ─── RENDER SUMMARY ───
function renderSummary(address,data){
  const s=data.score||0;
  const cls=s<25?'score-low':s<50?'score-mid':'score-high';
  const ap=data.addressProfile||{};
  document.getElementById('walletSummary').innerHTML=
    '<div><div class="wallet-addr">'+shortAddr(address)+'</div>'+
    '<div class="wallet-meta">'+(ap.txnCount||0)+' txns · '+(ap.walletAge!=null?ap.walletAge:'?')+' days old · '+(ap.solBalance||'0')+' SOL</div></div>'+
    '<div class="wallet-score"><span class="wallet-score-label">Lens Score</span><span class="wallet-score-val '+cls+'">'+s+'</span></div>';
}

// ─── HELPERS ───
function shortAddr(a){return a?a.slice(0,6)+'...'+a.slice(-4):''}
function truncate(s,n){return s.length>n?s.slice(0,n-1)+'…':s}
function setStatus(msg,err){const e=document.getElementById('statusLine');e.textContent=msg;e.className='status-line'+(err?' error':'')}
function delay(ms){return new Promise(r=>setTimeout(r,ms))}
function resetUI(){
  document.getElementById('graphContainer').classList.remove('active');
  document.getElementById('ctaSection').classList.remove('revealed');
  document.getElementById('owlObserver').classList.remove('active');
  document.getElementById('owlBubble').classList.remove('show');
  document.getElementById('infoCards').innerHTML='';
}
let owlTimeout;
function showOwl(text){
  const b=document.getElementById('owlBubble');
  b.textContent=text;b.classList.add('show');
  clearTimeout(owlTimeout);
  owlTimeout=setTimeout(()=>b.classList.remove('show'),4500);
}
</script>
